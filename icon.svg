<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0" stop-color="#72916B"/>
      <stop offset="1" stop-color="#56704E"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Stopwatch: countdown metaphor. Two colors only, #F8F7F1 glyph. -->
  <g fill="none" stroke="#F8F7F1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- top crown button -->
    <path d="M90 30 v14"/>
    <!-- side start button -->
    <path d="M128 52 l8 -8"/>
    <!-- watch body -->
    <circle cx="90" cy="106" r="50"/>
    <!-- hand, pointing up and to the right -->
    <path d="M90 106 L112 80"/>
  </g>
  <!-- top button cap and centre pin, solid weight -->
  <rect x="79" y="24" width="22" height="12" rx="4" fill="#F8F7F1"/>
  <circle cx="90" cy="106" r="6.5" fill="#F8F7F1"/>
</svg>
